<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gorilla Mind Waitlist</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .container { width: 100%; max-width: 600px; margin: auto; padding: 20px; text-align: center; }
        h1 { color: #333; }
        p { font-size: 16px; }
        .cta { margin-top: 20px; }
        input[type='email'] { padding: 10px; width: 70%; margin-right: 10px; }
        input[type='submit'] { padding: 10px 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Join the Gorilla Mind Waitlist</h1>
        <p>Be the first to know when we launch! Enter your email below:</p>
        <form>
            <input type="email" placeholder="Enter your email" required>
            <input type="submit" value="Join Waitlist">
        </form>
        <div class="cta">Follow us on social media for updates!</div>
    </div>
</body>
</html>
